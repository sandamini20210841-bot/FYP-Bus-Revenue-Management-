services:
  postgres:
    image: postgres:15-alpine
    container_name: busticket_postgres
    environment:
      POSTGRES_USER: busticket
      POSTGRES_PASSWORD: busticket_password
      POSTGRES_DB: busticket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U busticket"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6.0
    container_name: busticket_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_password
      MONGO_INITDB_DATABASE: busticket
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: busticket_backend
    environment:
      PORT: 8000
      POSTGRES_URL: postgres://busticket:busticket_password@postgres:5432/busticket
      MONGO_URL: mongodb://admin:admin_password@mongodb:27017
      MONGO_DB_NAME: busticket
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
  mongodb_data:
